name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to build (must be a tag of the form v* if you want it visible to clients)'
        required: false
        default: ''
      min_supported_version:
        description: 'Lowest version still allowed to run. Defaults to the release version (forces every prior version to update). Set lower for an opt-out release.'
        required: false
        default: ''
      channel:
        description: 'Release channel embedded in latest.json (beta or stable)'
        required: false
        default: 'beta'

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Migration tests
        run: pnpm test:migrations

      - name: Build + publish release
        env:
          # electron-builder reads GH_TOKEN; the workflow's auto-injected
          # GITHUB_TOKEN already has `contents: write` from the permissions block.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE_RELEASE: '1'
          WORKSPACE_PUBLISH: '1'
          WORKSPACE_RELEASE_CHANNEL: ${{ inputs.channel || 'beta' }}
          MIN_SUPPORTED_VERSION: ${{ inputs.min_supported_version }}
        run: pnpm --filter @workspace/desktop release

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: apps/desktop/dist/latest.json
          if-no-files-found: warn

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          if [ "${{ needs.release.result }}" = "success" ]; then
            echo "Release job succeeded. The draft release is on GitHub Releases."
            echo "Reminder: drafts are not visible to installed clients until you publish them."
          else
            echo "Release job did not succeed: ${{ needs.release.result }}"
            exit 1
          fi
